<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Character Platformer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #000; 
      display: flex; 
      flex-direction: column;
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      overflow: hidden;
      font-family: sans-serif;
      padding-bottom: 52px;
    }
    #frame {
      position: relative;
      width: 90vw;
      max-width: 1200px;
      aspect-ratio: 16 / 9;
      background: #111;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      border: 4px solid #222;
    }
    #ui {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 10;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      font-size: 14px;
    }
    #titleImg {
      position: absolute;
      top: -114px;
      left: 50%;
      transform: translateX(-50%);
      width: min(64%, 760px);
      height: auto;
      z-index: 9;
      pointer-events: none;
      filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.55));
      image-rendering: pixelated;
      animation: titleDropKaboom 1200ms cubic-bezier(.2,.8,.2,1) both;
      transform-origin: 50% 100%;
    }
    #titleImg.title-bounce {
      animation: titleRebound 700ms cubic-bezier(.25,.8,.25,1) both;
    }
    #kaboomFx {
      position: absolute;
      top: 128px;
      left: 50%;
      width: min(58%, 680px);
      height: 120px;
      transform: translateX(-50%) scaleX(0.2);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 214, 74, 0.85) 0%, rgba(255, 153, 0, 0.55) 45%, rgba(255, 99, 71, 0.0) 78%);
      opacity: 0;
      z-index: 8;
      pointer-events: none;
      animation: kaboomFlash 1000ms ease-out both;
    }
    #characterSelect {
      background: #161616;
      color: #fff;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 4px 8px;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 20;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 6px 12px;
      background: rgba(0, 0, 0, 0.72);
      border-top: 1px solid rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(4px);
    }
    .fork-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #f1f1f1;
      text-decoration: none;
      font-size: 13px;
      opacity: 0.92;
      transition: opacity 0.15s ease;
    }
    .fork-link:hover {
      opacity: 1;
    }
    .gh-icon {
      width: 15px;
      height: 15px;
      fill: currentColor;
      display: block;
    }
    .repo-badge {
      height: 20px;
      width: auto;
      display: block;
      border-radius: 4px;
    }

    @keyframes titleDropKaboom {
      0% {
        transform: translate(-50%, -240px) scale(0.9);
        opacity: 0;
      }
      55% {
        transform: translate(-50%, 0) scale(1.02);
        opacity: 1;
      }
      65% {
        transform: translate(-50%, 8px) scale(1.14, 0.84);
      }
      74% {
        transform: translate(-50%, -6px) scale(0.96, 1.08);
      }
      100% {
        transform: translate(-50%, 0) scale(1);
        opacity: 1;
      }
    }

    @keyframes kaboomFlash {
      0%, 56% {
        opacity: 0;
        transform: translateX(-50%) scaleX(0.2);
      }
      64% {
        opacity: 1;
        transform: translateX(-50%) scaleX(1.06);
      }
      100% {
        opacity: 0;
        transform: translateX(-50%) scaleX(1.35);
      }
    }

    @keyframes titleRebound {
      0% {
        transform: translateX(-50%) scale(1);
      }
      35% {
        transform: translateX(-50%) translateY(4px) scale(1.14, 0.86);
      }
      65% {
        transform: translateX(-50%) translateY(-6px) scale(0.96, 1.08);
      }
      100% {
        transform: translateX(-50%) scale(1);
      }
    }
  </style>
</head>
<body>

<div id="frame">
  <img id="titleImg" src="assets/title.png" alt="Title">
  <div id="kaboomFx" aria-hidden="true"></div>
  <div id="ui">
    <label for="characterSelect">Character</label>
    <select id="characterSelect"></select>
  </div>
  <canvas id="c"></canvas>
</div>
<footer>
  <a
    class="fork-link"
    href="https://github.com/hgosansn/slopformer"
    target="_blank"
    rel="noopener noreferrer"
  >
    <svg class="gh-icon" viewBox="0 0 16 16" aria-hidden="true">
      <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38
      0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
      -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
      .07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
      -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.5 7.5 0 0 1 4 0c1.53-1.04
      2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07
      -1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2
      0 .21.15.46.55.38A8 8 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/>
    </svg>
    Fork me on GitHub
  </a>
  <a href="https://github.com/hgosansn/slopformer" target="_blank" rel="noopener noreferrer" aria-label="GitHub repository badge">
    <img class="repo-badge" alt="GitHub Repo" src="https://img.shields.io/badge/GitHub-hgosansn%2Fslopformer-181717?logo=github&logoColor=white">
  </a>
</footer>

<script>
  // ── Config ─────────────────────────────────────────────────────────────────
  const FRAME_SIZE   = 128;   // px in spritesheet
  const FRAME_PAD    = 2;     // padding between frames in sheet
  const FRAME_STEP   = FRAME_SIZE + FRAME_PAD;
  const JUMP_PAD     = 1;
  const JUMP_STEP    = FRAME_SIZE + JUMP_PAD;
  const DISPLAY_SIZE = 240;   // rendered size on screen
  const WALK_FPS     = 10;    
  const TURN_FPS     = 12;
  const JUMP_FPS     = 14;
  const WALK_SPEED   = 180;   // px/sec
  const JUMP_CHANCE  = 0.9;   // chance to jump when action timer triggers

  // ── Canvas ─────────────────────────────────────────────────────────────────
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  const frame  = document.getElementById('frame');
  const titleImg = document.getElementById('titleImg');
  const characterSelect = document.getElementById('characterSelect');

  function resize() {
    // We use a fixed internal resolution for consistency
    canvas.width  = 1280;
    canvas.height = 720;
  }
  resize();

  // ── Load Assets ────────────────────────────────────────────────────────────
  const bg = new Image();
  bg.src = 'assets/bg.png';

  const CHARACTERS = [
    {
      id: 'trex',
      name: 'T-Rex',
      animations: {
        right: { frames: 16, fps: WALK_FPS, step: FRAME_STEP, file: 'right.png' },
        left:  { frames: 10, fps: WALK_FPS, step: FRAME_STEP, file: 'left.png' },
        turn:  { frames: 10, fps: TURN_FPS, step: FRAME_STEP, file: 'turn.png' },
        jump:  { frames: 20, fps: JUMP_FPS, step: JUMP_STEP, file: 'jump.png' },
      }
    }
  ];

  const anims = {
    right: { frames: 1, fps: WALK_FPS, step: FRAME_STEP, img: new Image() },
    left:  { frames: 1, fps: WALK_FPS, step: FRAME_STEP, img: new Image() },
    turn:  { frames: 1, fps: TURN_FPS, step: FRAME_STEP, img: new Image() },
    jump:  { frames: 1, fps: JUMP_FPS, step: JUMP_STEP, img: new Image() },
  };

  // ── State ──────────────────────────────────────────────────────────────────
  const characterState = {
    x:           100,
    phase:       'walk',        
    dir:         'right',       
    anim:        'right',       
    frame:       0,
    frameTimer:  0,
    pendingDir:  null,          
    randomTimer: nextRandomTurn(),
    jumpActionTimer: nextRandomJumpAction(),
    jumpOffsetY: 0,
    jumpTimer:   0,
    jumpDurMs:   0,
  };
  let currentCharacter = CHARACTERS[0];

  function nextRandomTurn() {
    return 3000 + Math.random() * 5000; 
  }

  function nextRandomJumpAction() {
    return 1200 + Math.random() * 1000;
  }

  function getGroundY() {
    // Floor is at 1/5 from the bottom
    return canvas.height * (4/5);
  }

  function getCharacterY() {
    // The feet should be on the ground. 
    // We adjust by a small offset if the sprite has padding.
    return getGroundY() - DISPLAY_SIZE + 20; 
  }

  function applyCharacter(characterDef) {
    currentCharacter = characterDef;
    for (const [name, cfg] of Object.entries(characterDef.animations)) {
      if (!anims[name]) continue;
      anims[name].frames = cfg.frames;
      anims[name].fps = cfg.fps;
      anims[name].step = cfg.step;
      anims[name].img.src = `characters/${characterDef.id}/sprites/${cfg.file}`;
    }
    startWalk('right');
    characterState.x = 100;
    document.title = `${characterDef.name} Platformer`;
  }

  function initCharacterSelector() {
    for (const charDef of CHARACTERS) {
      const opt = document.createElement('option');
      opt.value = charDef.id;
      opt.textContent = charDef.name;
      characterSelect.appendChild(opt);
    }
    const comingSoon = document.createElement('option');
    comingSoon.value = '';
    comingSoon.textContent = 'More to come...';
    comingSoon.disabled = true;
    characterSelect.appendChild(comingSoon);
    characterSelect.value = CHARACTERS[0].id;
    characterSelect.addEventListener('change', (e) => {
      const next = CHARACTERS.find((c) => c.id === e.target.value);
      if (next) applyCharacter(next);
    });
  }

  function startTurn(toDir) {
    if (characterState.phase === 'turn') return;
    characterState.phase      = 'turn';
    characterState.anim       = 'turn';
    characterState.frame      = 0;
    characterState.frameTimer = 0;
    characterState.pendingDir = toDir;
  }

  function startWalk(dir) {
    characterState.phase       = 'walk';
    characterState.dir         = dir;
    characterState.anim        = dir;
    characterState.frame       = 0;
    characterState.frameTimer  = 0;
    characterState.pendingDir  = null;
    characterState.randomTimer = nextRandomTurn();
    characterState.jumpActionTimer = nextRandomJumpAction();
    characterState.jumpOffsetY = 0;
    characterState.jumpTimer   = 0;
    characterState.jumpDurMs   = 0;
  }

  function startJump() {
    if (characterState.phase !== 'walk') return;
    characterState.phase      = 'jump';
    characterState.anim       = 'jump';
    characterState.frame      = 0;
    characterState.frameTimer = 0;
    characterState.jumpTimer  = 0;
    characterState.jumpDurMs  = (anims.jump.frames / anims.jump.fps) * 1000;
  }

  // ── Update ─────────────────────────────────────────────────────────────────
  function update(dt) {
    const anim         = anims[characterState.anim];
    const frameDur     = 1000 / anim.fps;

    // Advance animation frame
    characterState.frameTimer += dt;
    if (characterState.frameTimer >= frameDur) {
      characterState.frameTimer -= frameDur;
      characterState.frame++;
      if (characterState.frame >= anim.frames) {
        if (characterState.phase === 'turn') {
          startWalk(characterState.pendingDir);
        } else if (characterState.phase === 'jump') {
          startWalk(characterState.dir);
        } else {
          characterState.frame = 0; // loop
        }
      }
    }

    // Move + edge / random turn logic
    if (characterState.phase === 'walk') {
      const dx = (characterState.dir === 'right' ? 1 : -1) * WALK_SPEED * (dt / 1000);
      characterState.x += dx;

      const margin = 40;
      if (characterState.dir === 'right' && characterState.x + DISPLAY_SIZE >= canvas.width - margin) {
        characterState.x = canvas.width - margin - DISPLAY_SIZE;
        startTurn('left');
      } else if (characterState.dir === 'left' && characterState.x <= margin) {
        characterState.x = margin;
        startTurn('right');
      } else {
        characterState.randomTimer -= dt;
        characterState.jumpActionTimer -= dt;
        if (characterState.jumpActionTimer <= 0) {
          if (Math.random() < JUMP_CHANCE) {
            startJump();
          } else {
            startTurn(characterState.dir === 'right' ? 'left' : 'right');
          }
          characterState.jumpActionTimer = nextRandomJumpAction();
          characterState.randomTimer = nextRandomTurn();
        } else if (characterState.randomTimer <= 0) {
          startTurn(characterState.dir === 'right' ? 'left' : 'right');
          characterState.randomTimer = nextRandomTurn();
        }
      }
    } else if (characterState.phase === 'jump') {
      const dx = (characterState.dir === 'right' ? 1 : -1) * (WALK_SPEED * 0.8) * (dt / 1000);
      characterState.x += dx;

      const margin = 40;
      characterState.x = Math.max(margin, Math.min(canvas.width - margin - DISPLAY_SIZE, characterState.x));

      characterState.jumpTimer += dt;
      const t = Math.min(characterState.jumpTimer / characterState.jumpDurMs, 1);
      // Simple parabola for additional lift.
      characterState.jumpOffsetY = Math.sin(t * Math.PI) * 70;

      if ((characterState.dir === 'right' && characterState.x + DISPLAY_SIZE >= canvas.width - margin) ||
          (characterState.dir === 'left' && characterState.x <= margin)) {
        // If jump ends near edge, force a turn on landing.
        characterState.pendingDir = characterState.dir === 'right' ? 'left' : 'right';
      }
      if (t >= 1) {
        const landDir = characterState.pendingDir || characterState.dir;
        if (landDir !== characterState.dir) {
          startTurn(landDir);
        } else {
          startWalk(characterState.dir);
        }
      }
    }
  }

  // ── Draw ───────────────────────────────────────────────────────────────────
  function drawBG() {
    if (bg.complete) {
      // Draw background covering the canvas
      ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);
    } else {
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
  }

  function drawShadow(x, y) {
    const cx  = x + DISPLAY_SIZE / 2;
    const cy  = y + DISPLAY_SIZE - 15;
    const rx  = DISPLAY_SIZE * 0.25;
    const ry  = 8;
    
    const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, rx);
    grd.addColorStop(0,   'rgba(0,0,0,0.4)');
    grd.addColorStop(1,   'rgba(0,0,0,0)');
    
    ctx.save();
    ctx.scale(1, ry / rx);
    ctx.beginPath();
    ctx.arc(cx, cy * (rx / ry), rx, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();
    ctx.restore();
  }

  function drawCharacter() {
    const anim = anims[characterState.anim];
    if (!anim.img.complete || !anim.img.naturalWidth) return;

    const sx = characterState.frame * (anim.step || FRAME_STEP);
    const ty = getCharacterY() - characterState.jumpOffsetY;

    drawShadow(characterState.x, ty);
    const shouldFlipJump = characterState.anim === 'jump' && characterState.dir === 'left';
    if (shouldFlipJump) {
      ctx.save();
      ctx.translate(characterState.x + DISPLAY_SIZE, ty);
      ctx.scale(-1, 1);
      ctx.drawImage(anim.img, sx, 0, FRAME_SIZE, FRAME_SIZE, 0, 0, DISPLAY_SIZE, DISPLAY_SIZE);
      ctx.restore();
    } else {
      ctx.drawImage(anim.img, sx, 0, FRAME_SIZE, FRAME_SIZE, characterState.x, ty, DISPLAY_SIZE, DISPLAY_SIZE);
    }
  }

  // ── Loop ───────────────────────────────────────────────────────────────────
  let lastTs = null;

  function loop(ts) {
    if (!lastTs) lastTs = ts;
    const dt = Math.min(ts - lastTs, 100);
    lastTs = ts;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    drawBG();
    update(dt);
    drawCharacter();

    requestAnimationFrame(loop);
  }

  function triggerTitleBounce() {
    titleImg.classList.remove('title-bounce');
    void titleImg.offsetWidth; // restart CSS animation
    titleImg.classList.add('title-bounce');
  }

  initCharacterSelector();
  applyCharacter(CHARACTERS[0]);
  requestAnimationFrame(loop);
  setInterval(triggerTitleBounce, 10000);
</script>
</body>
</html>
